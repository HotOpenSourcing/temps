id: "1.1"
title: First-run setup creates exactly one admin user
section: 01-onboarding
docs: docs/release-testing.md#11-first-run-setup

# Caller is expected to have wiped users + run `temps setup --non-interactive`
# before invoking the suite. We verify the *outcome*, not the setup command
# itself, so this scenario can run against any fresh staging instance.
initial_vars:
  expected_email: admin@temps.sh

steps:
  - label: Visit the root
    action: ui_navigate
    url: /

  - label: Wait for the login form to render
    action: ui_wait_for
    selector: "input[type='email'], input[name='email']"
    timeoutMs: 10000

  - label: Screenshot the login page
    action: ui_screenshot
    name: login-page

verify:
  - kind: claude_assert
    prompt: |
      The screenshot should show a login form (not a setup wizard, not a 404,
      not a generic landing page). Pass only if you can see an email input
      and a password input. Quote the exact placeholder/label text in your
      reason.

  - kind: sql
    # Verify the bootstrap left exactly one admin user — no duplicate runs,
    # no extra accounts created. psql -A -t output is `count|bool_or`.
    query: |
      SELECT count(*), bool_or(role = 'admin') FROM users
    expect_regex: "^1\\|t$"
