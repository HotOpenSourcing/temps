id: "3.2"
title: Apply CPU + memory cap on a running container, live update
section: 03-storage
docs: docs/release-testing.md#32-resource-limits--apply-cpu--memory-cap-on-a-running-container

# This scenario assumes a running Postgres service named `pg-acceptance`
# already exists and is in the `running` state. The harness should set
# `service.id` and `service.name` in initial_vars before invoking — typically
# via a sql lookup in a prerequisite scenario or env-var seed. Hardcoded
# below for the pilot run; replace with a lookup once a prereq scenario
# exists.
initial_vars:
  service:
    id: 1
    name: pg-acceptance
    container_name: postgres-pg-acceptance
  limits:
    memory_mb: 512
    cpu_cores: 2
  expected_memory_bytes: "536870912"
  expected_nano_cpus: "2000000000"

steps:
  - label: Open the service detail page
    action: ui_navigate
    url: /storage/{{service.id}}

  - label: Wait for the Resources panel to render
    action: ui_wait_for
    selector: "text=Resources"
    timeoutMs: 10000

  - label: Click "Edit limits"
    action: ui_click
    selector: "button:has-text('Edit limits')"

  - label: Wait for dialog
    action: ui_wait_for
    selector: "text=Resource limits"
    timeoutMs: 5000

  - label: Toggle memory limit on
    action: ui_toggle
    selector: "#resource-memory-toggle"
    state: "on"

  - label: Set memory to {{limits.memory_mb}} MiB
    action: ui_fill
    selector: "#resource-memory-mb"
    value: "{{limits.memory_mb}}"

  - label: Toggle CPU limit on
    action: ui_toggle
    selector: "#resource-cpu-toggle"
    state: "on"

  - label: Set CPU to {{limits.cpu_cores}} cores
    action: ui_fill
    selector: "#resource-cpu-cores"
    value: "{{limits.cpu_cores}}"

  - label: Save limits
    action: ui_click
    selector: "button:has-text('Save limits')"

  - label: Wait for toast
    action: sleep
    ms: 2000

  - label: Screenshot the updated panel
    action: ui_screenshot
    name: resources-panel-after-apply

verify:
  # 1. Container HostConfig actually carries the caps (live update worked,
  #    not just stored config).
  - kind: shell
    cmd: |
      docker inspect {{service.container_name}} \
        --format '{{`{{.HostConfig.Memory}}`}}'
    expect_exact: "{{expected_memory_bytes}}"

  - kind: shell
    cmd: |
      docker inspect {{service.container_name}} \
        --format '{{`{{.HostConfig.NanoCpus}}`}}'
    expect_exact: "{{expected_nano_cpus}}"

  # 2. Restart count is unchanged (live update, no recreate).
  - kind: shell
    cmd: |
      docker inspect {{service.container_name}} \
        --format '{{`{{.RestartCount}}`}}'
    expect_exact: "0"

  # 3. The Resources panel reflects the new caps. The CPU caption rebases
  #    to "of {N} cores capped (host M)" — that's the canonical way the
  #    UI signals an applied CPU cap.
  - kind: claude_assert
    prompt: |
      Look at the Resources panel screenshot. Pass only if ALL of these are
      true; quote the exact text you see in your reason:
        - The CPU cell shows "X.X% of {{limits.cpu_cores}} cores capped"
          (with optional "(host N)" suffix).
        - The Memory cell shows usage on the left and "{{limits.memory_mb}}
          MiB" or similar on the right (NOT "of host RAM").
        - The "No limits applied" line is NOT present.
        - There is no error toast or red banner.
      Fail with the actual text on screen if any condition is missing.
