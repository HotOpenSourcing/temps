id: "3.3"
title: Switching memory back to unlimited on a running container requires recreate
section: 03-storage
docs: docs/release-testing.md#33-resource-limits--switch-memory-back-to-unlimited-on-running-container

# Runs after 3.2 — assumes the same service still has a 512 MiB memory cap
# applied. We toggle memory off and verify the toast text + that docker
# inspect STILL reports the old memory cap (Docker can't hot-remove memory
# limits — only swap-them-down, never to 0).
initial_vars:
  service:
    id: 1
    name: pg-acceptance
    container_name: postgres-pg-acceptance
  expected_memory_bytes_before: "536870912"

steps:
  - label: Confirm precondition — memory cap is in place
    action: shell
    cmd: |
      docker inspect {{service.container_name}} \
        --format '{{`{{.HostConfig.Memory}}`}}'
    expect_exact: "{{expected_memory_bytes_before}}"

  - label: Open the service detail page
    action: ui_navigate
    url: /storage/{{service.id}}

  - label: Click "Edit limits"
    action: ui_click
    selector: "button:has-text('Edit limits')"

  - label: Wait for dialog
    action: ui_wait_for
    selector: "text=Resource limits"
    timeoutMs: 5000

  - label: Toggle memory off (back to unlimited)
    action: ui_toggle
    selector: "#resource-memory-toggle"
    state: "off"

  - label: Save
    action: ui_click
    selector: "button:has-text('Save limits')"

  - label: Wait for toast
    action: sleep
    ms: 2000

  - label: Screenshot the toast region
    action: ui_screenshot
    name: requires-recreate-toast

verify:
  # 1. Docker still reports the old cap. The whole point of this scenario:
  #    Docker refuses to hot-remove memory limits, so the container keeps
  #    the cap until it's recreated.
  - kind: shell
    cmd: |
      docker inspect {{service.container_name}} \
        --format '{{`{{.HostConfig.Memory}}`}}'
    expect_exact: "{{expected_memory_bytes_before}}"

  # 2. The toast tells the operator a restart is required — without that
  #    copy, an operator would think the unlimited setting failed.
  - kind: claude_assert
    prompt: |
      Look at the screenshot. There should be a toast notification (top-right
      area) that mentions a restart or recreate being required to remove the
      memory cap. Pass only if you see copy of the form
      "Limits saved — restart required" (or similar wording about
      recreating/restarting). Quote the exact toast text in your reason.
      Fail if the toast says "applied" or there is no toast visible.

  # NOTE: We don't probe `external_services.config` directly — it's
  # encrypted at rest. The persistence side is covered by 3.2's runtime
  # endpoint round-trip; this scenario only asserts the live-update behavior.
